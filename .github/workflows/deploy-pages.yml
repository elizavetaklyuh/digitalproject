name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Ensure Pages uses GitHub Actions
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          status="$(curl -sS -o /tmp/pages.json -w "%{http_code}" "${headers[@]}" "${api}")"

          if [ "${status}" = "200" ]; then
            curl -sS -X PUT "${headers[@]}" "${api}" -d '{"build_type":"workflow"}'
          else
            curl -sS -X POST "${headers[@]}" "${api}" -d '{"build_type":"workflow"}'
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_BASE_PATH: /digitalproject

      - name: Prepare Pages files
        run: touch ./out/.nojekyll

      - name: Push static site to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy static site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
